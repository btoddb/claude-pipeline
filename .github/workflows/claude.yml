# Reusable `@claude` pipeline — workflow_call version of this repo's
# .github/workflows/claude.yml, converted to be shared across repos.
#
# This file is a TEMPLATE, not an active workflow: rename it to
# `.github/workflows/claude.yml` inside the new dedicated pipeline repo
# (e.g. <owner>/claude-pipeline). It cannot be dropped into this repo as-is —
# GitHub Apps cannot author files under .github/workflows/, which is exactly
# why this stays a template here. See MIGRATION.md in this folder.
#
# Replace every `<OWNER>/<PIPELINE_REPO>` below with the dedicated repo's
# actual owner/name once it exists, then tag the repo `v1`.

name: Claude Code (reusable)

on:
  workflow_call:
    inputs:
      maintainer:
        description: GitHub username to @-mention on hard failures and parked plans
        type: string
        required: true
      setup:
        description: Language runtime to set up before lint/test phases ("python", "node", or "none")
        type: string
        required: false
        default: "none"
      python-version:
        type: string
        required: false
        default: "3.14"
      node-version:
        type: string
        required: false
        default: "22"
      install-command:
        description: Shell command to install dependencies (run from the repo root after setup)
        type: string
        required: false
        default: ""
      plan-allowed-tools:
        description: Extra --allowedTools entries for the plan phase (comma-separated), appended to the file-tool defaults
        type: string
        required: false
        default: ""
      implement-allowed-tools:
        description: Extra --allowedTools entries for the implement phase (comma-separated), appended to the file-tool defaults
        type: string
        required: false
        default: ""
      review-allowed-tools:
        description: --allowedTools entries for the review phase (comma-separated); review never gets Edit/Write
        type: string
        required: false
        default: ""
      plan-model:
        type: string
        required: false
        default: "claude-opus-4-8"
      implement-model:
        type: string
        required: false
        default: "claude-sonnet-4-6"
      review-model:
        type: string
        required: false
        default: "claude-opus-4-8"
      respond-model-pr-review:
        type: string
        required: false
        default: "claude-opus-4-8"
      respond-model-followup:
        type: string
        required: false
        default: "claude-sonnet-4-6"
      plan-effort:
        type: string
        required: false
        default: "xhigh"
      implement-effort:
        type: string
        required: false
        default: "high"
      review-effort:
        type: string
        required: false
        default: "high"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

# Single source of truth for the tools the code-changing phases get. Both the
# issue-side `implement` job and the PR-side `revise` job reference this, so a
# tool added here reaches both — they can never silently drift apart (which is
# exactly how `revise`/`respond` ended up without deploy/npm in the first place).
# Each job still appends the per-repo `implement-allowed-tools` input on top.
#
# All Claude-running phases may file follow-up GitHub issues, but the phase
# toolsets below still control the code-write boundary: planning/review/respond
# remain unable to edit files or push branches.
#
# PLAN_TOOLS is code-read-only: no Edit/Write/Bash that could push code. This
# prevents Claude from attempting git push in the plan job, which only has
# contents: read.
env:
  PLAN_TOOLS: "Read,Glob,Grep,Bash(gh issue create *)"
  RESPOND_TOOLS: "Read,Glob,Grep,Bash(gh issue create *)"
  REVIEW_TOOLS: "Read,Glob,Grep,Bash(python3 -m pytest*),Bash(gh issue create *)"
  IMPL_TOOLS: "Read,Edit,Write,Glob,Grep,Bash(python3 -m pytest*),Bash(scripts/lint *),Bash(gh pr create *),Bash(gh issue create *),Bash(scripts/deploy.sh:*),Bash(npm *)"

jobs:
  dispatch:
    # Only fire when the text that actually triggered this event mentions
    # @claude. Checking issue.body/title for *comment* events would let any
    # unrelated comment on an @claude-titled issue start (and silently skip)
    # the pipeline; gating per event keeps route=skip from ever happening.
    if: |
      (github.event_name == 'issues' &&
        (contains(github.event.issue.title, '@claude') || contains(github.event.issue.body, '@claude'))) ||
      ((github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
        contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      route: ${{ steps.route.outputs.route }}
      plan_only: ${{ steps.route.outputs.plan_only }}
      notify_reason: ${{ steps.route.outputs.notify_reason }}
    steps:
      - name: Route the @claude command
        id: route
        env:
          EVENT: ${{ github.event_name }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          REVIEW_BODY: ${{ github.event.review.body }}
          PR_URL: ${{ github.event.issue.pull_request.url }}
        run: |
          set -euo pipefail
          case "$EVENT" in
            issues)                      text="$ISSUE_TITLE $ISSUE_BODY" ;;
            issue_comment)               text="$COMMENT_BODY" ;;
            pull_request_review)         text="$REVIEW_BODY" ;;
            pull_request_review_comment) text="$COMMENT_BODY" ;;
            *)                           text="" ;;
          esac

          is_pr=false
          case "$EVENT" in
            pull_request_review|pull_request_review_comment) is_pr=true ;;
            issue_comment) if [ -n "$PR_URL" ]; then is_pr=true; fi ;;
          esac

          # Lowercase copy, and the first whitespace-delimited word right after
          # the first @claude mention ("" = bare @claude / no subcommand).
          lc="$(printf '%s' "$text" | tr '[:upper:]' '[:lower:]')"
          cmd="$(printf '%s' "$lc" | grep -oE '@claude[[:space:]]+[a-z]+' | head -n1 \
            | sed -E 's/^@claude[[:space:]]+//' || true)"

          route=skip
          plan_only=false
          notify_reason=""
          if printf '%s' "$lc" | grep -q '@claude'; then
            if [ "$is_pr" = true ]; then
              case "$cmd" in
                review)         route=review ;;
                revise)         route=revise ;;
                ship)           route=ship ;;
                "")             route=respond ;;
                plan|implement) route=notify; notify_reason=pr_pipeline ;;
                *)              route=notify; notify_reason=unknown ;;
              esac
            else
              case "$cmd" in
                plan)           route=plan; plan_only=true ;;
                implement)      route=implement ;;
                "")             route=plan ;;
                review)         route=notify; notify_reason=issue_review ;;
                ship)           route=notify; notify_reason=issue_ship ;;
                *)              route=notify; notify_reason=unknown ;;
              esac
            fi
          fi

          echo "route=$route" >> "$GITHUB_OUTPUT"
          echo "plan_only=$plan_only" >> "$GITHUB_OUTPUT"
          echo "notify_reason=$notify_reason" >> "$GITHUB_OUTPUT"
          echo "Routed event '$EVENT' (is_pr=$is_pr cmd='$cmd') -> route=$route plan_only=$plan_only notify_reason=$notify_reason"

  notify:
    needs: dispatch
    if: needs.dispatch.outputs.route == 'notify'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Explain why nothing ran
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          REASON: ${{ needs.dispatch.outputs.notify_reason }}
        run: |
          set -euo pipefail
          case "$REASON" in
            pr_pipeline)
              body=$'🤖 `@claude plan` and `@claude implement` run on **issues**, not pull requests — there is no plan/implement pipeline for a PR, so nothing ran.\n\nOn a pull request you can:\n- comment `@claude review` for a code review,\n- comment `@claude revise <what to change>` to iterate on this PR\'s code,\n- comment `@claude ship [--force] [--public-release]` to merge and release, or\n- comment `@claude <your question or request>` and I will respond here.\n\nTo build something new, open an issue and comment `@claude`.' ;;
            issue_review)
              body=$'🤖 `@claude review` runs on **pull requests**, not issues, so nothing ran.\n\nOn an issue, comment `@claude` (full pipeline), `@claude plan`, or `@claude implement`.' ;;
            issue_ship)
              body=$'🤖 `@claude ship` runs on **pull requests**, not issues, so nothing ran.\n\nComment `@claude ship` on an open pull request to squash-merge it and cut a release.' ;;
            *)
              body=$'🤖 I did not recognize that `@claude` command, so nothing ran. Recognized commands:\n- `@claude` — full pipeline (plan → implement) on an issue\n- `@claude plan` — planning only (issue)\n- `@claude implement` — implement the latest plan (issue)\n- `@claude review` — review a pull request\n- `@claude revise` — iterate on a pull request\'s code\n- `@claude ship [--force] [--public-release]` — merge a pull request and cut a release\n\nOn a pull request, `@claude <message>` responds to the conversation.' ;;
          esac
          gh issue comment "$NUMBER" --repo "$REPO" --body "$body"

  respond:
    needs: dispatch
    if: needs.dispatch.outputs.route == 'respond'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Run Claude Code
        id: claude
        env:
          GH_TOKEN: ${{ github.token }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model ${{ github.event_name == 'pull_request_review' && inputs.respond-model-pr-review || inputs.respond-model-followup }}
            --allowedTools "${{ env.RESPOND_TOOLS }}"
      - name: Check Claude result
        id: check_result
        if: always() && steps.claude.outputs.execution_file != ''
        run: |
          if jq -e 'any(.[]; .type == "result" and .is_error == true)' "${{ steps.claude.outputs.execution_file }}" >/dev/null; then
            echo "::error::Claude returned an error result (is_error: true) before producing usable output."
            exit 1
          fi
      - name: Log actual model used
        if: always() && steps.claude.outputs.execution_file != ''
        uses: btoddb/claude-pipeline/actions/log-model@v1
        with:
          number: ${{ github.event.issue.number || github.event.pull_request.number }}
          phase: Response
          execution-file: ${{ steps.claude.outputs.execution_file }}
          github-token: ${{ github.token }}
      - name: Report failure
        if: always() && (steps.claude.outcome == 'failure' || steps.check_result.outcome == 'failure')
        uses: btoddb/claude-pipeline/actions/report-failure@v1
        with:
          number: ${{ github.event.issue.number || github.event.pull_request.number }}
          phase: Response
          execution-file: ${{ steps.claude.outputs.execution_file }}
          maintainer: ${{ inputs.maintainer }}
          github-token: ${{ github.token }}

  revise:
    # PR-only iteration: re-implement on the existing PR branch from the
    # feedback in the @claude revise comment. Unlike `respond`, this gets the
    # full code-changing toolset (IMPL_TOOLS + implement-allowed-tools) and the
    # language setup, so it can run lint/tests/deploy/npm while iterating.
    needs: dispatch
    if: needs.dispatch.outputs.route == 'revise'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Resolve PR branch
        id: prbranch
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          set -euo pipefail
          head="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefName --jq .headRefName)"
          if [ -z "$head" ]; then
            echo "::error::Could not resolve the PR head branch for #$PR_NUMBER."
            exit 1
          fi
          echo "head=$head" >> "$GITHUB_OUTPUT"
          echo "Iterating on PR #$PR_NUMBER (branch $head)."
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.prbranch.outputs.head }}
          fetch-depth: 0
      - name: Set up Python
        if: inputs.setup == 'python'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}
          cache: "pip"
      - name: Set up Node
        if: inputs.setup == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
      - name: Install dependencies
        if: inputs.install-command != ''
        run: ${{ inputs.install-command }}
      - name: Revise (Sonnet)
        id: claude
        env:
          GH_TOKEN: ${{ github.token }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model ${{ inputs.implement-model }}
            --effort ${{ inputs.implement-effort }}
            --allowedTools "${{ env.IMPL_TOOLS }}${{ inputs.implement-allowed-tools != '' && format(',{0}', inputs.implement-allowed-tools) || '' }}"
      - name: Check Claude result
        id: check_result
        if: always() && steps.claude.outputs.execution_file != ''
        run: |
          if jq -e 'any(.[]; .type == "result" and .is_error == true)' "${{ steps.claude.outputs.execution_file }}" >/dev/null; then
            echo "::error::Claude returned an error result (is_error: true) before producing usable output."
            exit 1
          fi
      - name: Log actual model used
        if: always() && steps.claude.outputs.execution_file != ''
        uses: btoddb/claude-pipeline/actions/log-model@v1
        with:
          number: ${{ github.event.issue.number || github.event.pull_request.number }}
          phase: Revision
          execution-file: ${{ steps.claude.outputs.execution_file }}
          effort: ${{ inputs.implement-effort }}
          github-token: ${{ github.token }}
      - name: Report failure
        if: always() && (steps.claude.outcome == 'failure' || steps.check_result.outcome == 'failure')
        uses: btoddb/claude-pipeline/actions/report-failure@v1
        with:
          number: ${{ github.event.issue.number || github.event.pull_request.number }}
          phase: Revision
          execution-file: ${{ steps.claude.outputs.execution_file }}
          maintainer: ${{ inputs.maintainer }}
          github-token: ${{ github.token }}

  review:
    needs: dispatch
    if: needs.dispatch.outputs.route == 'review'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Set up Python
        if: inputs.setup == 'python'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}
          cache: "pip"
      - name: Set up Node
        if: inputs.setup == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
      - name: Install dependencies
        if: inputs.install-command != ''
        run: ${{ inputs.install-command }}
      - name: Review (Opus)
        id: claude
        env:
          GH_TOKEN: ${{ github.token }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model ${{ inputs.review-model }}
            --effort ${{ inputs.review-effort }}
            --allowedTools "${{ env.REVIEW_TOOLS }}${{ inputs.review-allowed-tools != '' && format(',{0}', inputs.review-allowed-tools) || '' }}"
      - name: Check Claude result
        id: check_result
        if: always() && steps.claude.outputs.execution_file != ''
        run: |
          if jq -e 'any(.[]; .type == "result" and .is_error == true)' "${{ steps.claude.outputs.execution_file }}" >/dev/null; then
            echo "::error::Claude returned an error result (is_error: true) before producing usable output."
            exit 1
          fi
      - name: Log actual model used
        if: always() && steps.claude.outputs.execution_file != ''
        uses: btoddb/claude-pipeline/actions/log-model@v1
        with:
          number: ${{ github.event.issue.number || github.event.pull_request.number }}
          phase: Review
          execution-file: ${{ steps.claude.outputs.execution_file }}
          effort: ${{ inputs.review-effort }}
          github-token: ${{ github.token }}
      - name: Report failure
        if: always() && (steps.claude.outcome == 'failure' || steps.check_result.outcome == 'failure')
        uses: btoddb/claude-pipeline/actions/report-failure@v1
        with:
          number: ${{ github.event.issue.number || github.event.pull_request.number }}
          phase: Review
          execution-file: ${{ steps.claude.outputs.execution_file }}
          maintainer: ${{ inputs.maintainer }}
          github-token: ${{ github.token }}

  ship:
    needs: dispatch
    if: needs.dispatch.outputs.route == 'ship'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
    steps:
      - name: Preflight — parse args and check PR state
        id: preflight
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          COMMENT_BODY: ${{ github.event.comment.body || github.event.review.body }}
          AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association || github.event.review.author_association }}
        run: |
          set -euo pipefail

          # Authorization gate: only repo collaborators/members/owners may ship.
          case "$AUTHOR_ASSOCIATION" in
            OWNER|MEMBER|COLLABORATOR) ;;
            *)
              gh issue comment "$PR_NUMBER" --repo "$REPO" \
                --body "🤖 \`@claude ship\` is restricted to repository collaborators. Nothing ran."
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          # Extract original-case args after "@claude ship" to preserve case-sensitive values.
          extra="$(printf '%s' "$COMMENT_BODY" | grep -oiE '@claude[[:space:]]+ship[[:space:]]*.*' | head -n1 \
            | sed -E 's/^[^[:space:]]+[[:space:]]+[^[:space:]]+[[:space:]]*//' || true)"
          force=false
          ship_args=""
          for arg in $extra; do
            arg_lower="$(printf '%s' "$arg" | tr '[:upper:]' '[:lower:]')"
            if [ "$arg_lower" = "--force" ]; then
              force=true
            else
              ship_args="$ship_args $arg"
            fi
          done
          ship_args="${ship_args# }"
          echo "force=$force" >> "$GITHUB_OUTPUT"
          echo "ship_args=$ship_args" >> "$GITHUB_OUTPUT"
          echo "Parsed: force=$force forwarded='$ship_args'"

          pr_state="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state --jq .state)"
          if [ "$pr_state" != "OPEN" ]; then
            gh issue comment "$PR_NUMBER" --repo "$REPO" \
              --body "🤖 Cannot ship — PR #${PR_NUMBER} is not open (state: ${pr_state})."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$force" = false ]; then
            # Block unless ALL checks are green — catches failed, pending, and in-progress.
            not_green_list="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json statusCheckRollup \
              --jq '[(.statusCheckRollup // [])[] | select((.conclusion == "SUCCESS" or .conclusion == "SKIPPED" or .conclusion == "NEUTRAL" or .state == "SUCCESS") | not) | "- **\(.name)**: \(.conclusion // .state // "pending")"] | join("\n")')"
            if [ -n "$not_green_list" ]; then
              gh issue comment "$PR_NUMBER" --repo "$REPO" \
                --body "$(printf '🤖 Cannot ship — the following checks are not green:\n\n%s\n\nFix or wait for them, then retry. Use `@claude ship --force` to merge anyway.' "$not_green_list")"
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Squash-merge and delete branch
        if: steps.preflight.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --delete-branch

      - name: Checkout main
        if: steps.preflight.outputs.proceed == 'true'
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Run scripts/ship
        if: steps.preflight.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SHIP_ARGS: ${{ steps.preflight.outputs.ship_args }}
        run: |
          set -euo pipefail
          if [ ! -f scripts/ship ]; then
            echo "::error::scripts/ship not found — create it from templates/ship.template."
            exit 1
          fi
          chmod +x scripts/ship
          set -f
          # shellcheck disable=SC2086
          scripts/ship $SHIP_ARGS

      - name: Report failure
        if: failure()
        uses: btoddb/claude-pipeline/actions/report-failure@v1
        with:
          number: ${{ github.event.issue.number || github.event.pull_request.number }}
          phase: Ship
          maintainer: ${{ inputs.maintainer }}
          github-token: ${{ github.token }}

  plan:
    needs: dispatch
    if: needs.dispatch.outputs.route == 'plan'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Snapshot comment timeline
        id: snapshot
        run: echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - name: Plan (Opus)
        id: claude
        env:
          GH_TOKEN: ${{ github.token }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model ${{ inputs.plan-model }}
            --effort ${{ inputs.plan-effort }}
            --allowedTools "${{ env.PLAN_TOOLS }}${{ inputs.plan-allowed-tools != '' && format(',{0}', inputs.plan-allowed-tools) || '' }}"
      - name: Check Claude result
        id: check_result
        if: always() && steps.claude.outputs.execution_file != ''
        run: |
          if jq -e 'any(.[]; .type == "result" and .is_error == true)' "${{ steps.claude.outputs.execution_file }}" >/dev/null; then
            echo "::error::Claude returned an error result (is_error: true) before producing usable output."
            exit 1
          fi
      - name: Log actual model used
        if: always() && steps.claude.outputs.execution_file != ''
        uses: btoddb/claude-pipeline/actions/log-model@v1
        with:
          number: ${{ github.event.issue.number }}
          phase: Planning
          execution-file: ${{ steps.claude.outputs.execution_file }}
          effort: ${{ inputs.plan-effort }}
          github-token: ${{ github.token }}
      - name: Stamp markers and decide whether to auto-implement
        id: gate
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          STARTED_AT: ${{ steps.snapshot.outputs.started_at }}
          PLAN_ONLY: ${{ needs.dispatch.outputs.plan_only }}
          CLAUDE_OUTCOME: ${{ (steps.check_result.outcome == 'failure' && 'failure') || steps.claude.outcome }}
          MAINTAINER: ${{ inputs.maintainer }}
        run: |
          set -euo pipefail

          plan="$(gh issue view "$ISSUE" --repo "$REPO" --json comments \
            --jq '[.comments[]
                   | select(.author.login != "github-actions")
                   | select(.createdAt > "'"$STARTED_AT"'")]
                  | last | .body // ""')"

          if [ -z "$plan" ]; then
            if [ "$CLAUDE_OUTCOME" = "failure" ]; then
              gh issue comment "$ISSUE" --repo "$REPO" --body \
                "🤖 @${MAINTAINER} the **Planning** phase failed. Check the Actions run, then re-comment \`@claude plan\` to retry."
            else
              gh issue comment "$ISSUE" --repo "$REPO" --body \
                "🤖 @${MAINTAINER} planning ran but produced **no plan comment**, so the pipeline could not hand off to implementation. Please re-run \`@claude plan\`."
            fi
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::error::Planning produced no plan comment; failing so the skip is never silent."
            exit 1
          fi

          has_questions=false
          printf '%s' "$plan" | grep -q '\[QUESTION\]' && has_questions=true

          proceed=false
          if [ "$has_questions" = false ] && [ "$PLAN_ONLY" != "true" ]; then
            proceed=true
          fi

          if [ "$proceed" = true ]; then
            body="$(printf '%s\n%s\n\n%s\n' \
              '<!-- claude:plan -->' '<!-- claude:proceed -->' \
              '🤖 Plan has no open questions — proceeding to implementation.')"
          elif [ "$has_questions" = true ]; then
            body="$(printf '%s\n\n%s\n' '<!-- claude:plan -->' \
              "🤖 @${MAINTAINER} the plan above has open \`[QUESTION]\` items — implementation is parked until they are resolved. Reply with answers, then comment \`@claude\` to re-plan, or \`@claude implement\` to build it as-is.")"
          else
            body="$(printf '%s\n\n%s\n' '<!-- claude:plan -->' \
              '🤖 Plan-only run — implementation was not started. Comment `@claude implement` to build this plan.')"
          fi
          gh issue comment "$ISSUE" --repo "$REPO" --body "$body"

          echo "proceed=$proceed" >> "$GITHUB_OUTPUT"
          echo "Plan located (has_questions=$has_questions, plan_only=$PLAN_ONLY, proceed=$proceed)."

  implement:
    needs: [dispatch, plan]
    if: >-
      ${{ !cancelled() && (
        needs.dispatch.outputs.route == 'implement' ||
        (needs.plan.result == 'success' && needs.plan.outputs.proceed == 'true' && needs.dispatch.outputs.plan_only == 'false')
      ) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Ensure a plan exists
        id: check_plan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          body="$(gh issue view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --json comments \
            --jq '[.comments[] | select(.body | contains("claude:plan"))] | last | .body // ""')"
          if [ -z "$body" ]; then
            echo "No plan comment found; skipping implementation."
            gh issue comment "${{ github.event.issue.number }}" \
              --repo "${{ github.repository }}" \
              --body "🤖 \`@claude implement\` found no plan to build. Run \`@claude plan\` first, or \`@claude\` for the full pipeline."
            echo "has_plan=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_plan=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout repository
        if: steps.check_plan.outputs.has_plan == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        if: steps.check_plan.outputs.has_plan == 'true' && inputs.setup == 'python'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}
          cache: "pip"
      - name: Set up Node
        if: steps.check_plan.outputs.has_plan == 'true' && inputs.setup == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
      - name: Install dependencies
        if: steps.check_plan.outputs.has_plan == 'true' && inputs.install-command != ''
        run: ${{ inputs.install-command }}
      - name: Implement (Sonnet)
        id: claude
        if: steps.check_plan.outputs.has_plan == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model ${{ inputs.implement-model }}
            --effort ${{ inputs.implement-effort }}
            --allowedTools "${{ env.IMPL_TOOLS }}${{ inputs.implement-allowed-tools != '' && format(',{0}', inputs.implement-allowed-tools) || '' }}"
      - name: Check Claude result
        id: check_result
        if: always() && steps.claude.outputs.execution_file != ''
        run: |
          if jq -e 'any(.[]; .type == "result" and .is_error == true)' "${{ steps.claude.outputs.execution_file }}" >/dev/null; then
            echo "::error::Claude returned an error result (is_error: true) before producing usable output."
            exit 1
          fi
      - name: Log actual model used
        if: always() && steps.claude.outputs.execution_file != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          target="${{ github.event.issue.number }}"
          if [ -n "${{ steps.claude.outputs.branch_name }}" ]; then
            pr="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "${{ steps.claude.outputs.branch_name }}" \
              --json number --jq '.[0].number // ""')"
            [ -n "$pr" ] && target="$pr"
          fi
          echo "target=$target" >> "$GITHUB_OUTPUT"
        id: target
      - uses: btoddb/claude-pipeline/actions/log-model@v1
        if: always() && steps.claude.outputs.execution_file != ''
        with:
          number: ${{ steps.target.outputs.target }}
          phase: Implementation
          execution-file: ${{ steps.claude.outputs.execution_file }}
          effort: ${{ inputs.implement-effort }}
          github-token: ${{ github.token }}
      - uses: btoddb/claude-pipeline/actions/report-failure@v1
        if: always() && (steps.claude.outcome == 'failure' || steps.check_result.outcome == 'failure')
        with:
          number: ${{ steps.target.outputs.target }}
          phase: Implementation
          execution-file: ${{ steps.claude.outputs.execution_file }}
          maintainer: ${{ inputs.maintainer }}
          github-token: ${{ github.token }}
